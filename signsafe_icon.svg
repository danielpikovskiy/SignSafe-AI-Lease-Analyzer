<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="halfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E40AF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Full shield -->
    <path d="M50 6 L86 20 L86 54 Q86 78 50 94 Q14 78 14 54 L14 20 Z"
          fill="url(#shieldGrad)" />
    <!-- Right half darker overlay -->
    <path d="M50 6 L86 20 L86 54 Q86 78 50 94 L50 6 Z"
          fill="url(#halfGrad)" opacity="0.75"/>
    <!-- Inner highlight -->
    <path d="M50 12 L80 24 L80 54 Q80 74 50 88 Q20 74 20 54 L20 24 Z"
          fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>

  <!-- Contract lines + checkmark -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <line x1="34" y1="42" x2="66" y2="42" stroke-width="3" stroke-opacity="0.55"/>
    <line x1="34" y1="51" x2="66" y2="51" stroke-width="3" stroke-opacity="0.55"/>
    <polyline points="32,63 43,74 68,52" stroke-width="4" stroke-opacity="1"/>
  </g>
</svg>
